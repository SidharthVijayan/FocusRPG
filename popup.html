<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FocusRPG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>🎮 FocusRPG</h2>

  <!-- TIMER -->
  <div id="timer">25:00</div>

  <!-- CONTROLS -->
  <button id="start">Start</button>
  <button id="reset">Reset</button>

  <!-- SOUND TOGGLE -->
  <label style="display:block; margin-top:10px;">
    <input type="checkbox" id="soundToggle"> 🔊 Sound Effects
  </label>

  <!-- MUSIC SECTION -->
  <div style="margin-top:15px;">

    <p style="font-size:12px; color:#aaa;">🎧 Live Focus Radio</p>

    <!-- CHANNEL SELECTOR -->
    <select id="channelSelect" style="width:100%; padding:8px; margin-bottom:8px;">
      <option value="0">🌿 Ambient</option>
      <option value="1">🧘 Deep Focus</option>
      <option value="2">🎶 Chill</option>
    </select>

    <!-- PLAY BUTTON -->
    <button id="music">▶ Play</button>

  </div>

  <!-- STATUS -->
  <p id="status" style="margin-top:10px;"></p>

  <!-- SCRIPT -->
  <script src="popup.js"></script>

</body>
</html>
