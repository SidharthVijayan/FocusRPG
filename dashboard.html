<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FocusRPG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🎮 FocusRPG</h1>

  <!-- 🔥 STREAK HERO (ADDED - IMPORTANT) -->
  <div class="card streak-card">
    <div id="streakBox">🔥 Loading streak...</div>
  </div>

  <!-- 🎭 PROFILE -->
  <div class="card profile-card">
    <div id="profile"></div>
  </div>

  <!-- 📊 STATS -->
  <div class="card">
    <h3>📊 Today</h3>
    <div id="stats"></div>
  </div>

  <!-- 🏅 BADGES -->
  <div class="card">
    <h3>🏅 Badges</h3>
    <div id="badges">Loading...</div>
  </div>

  <!-- 🎯 QUESTS -->
  <div class="card">
    <h3>🎯 Daily Quests</h3>
    <div id="quests">Loading...</div>
  </div>

  <!-- 🌐 ACTIVITY TABLE -->
  <div class="card">
    <h3>🌐 Activity Breakdown</h3>
    <table>
      <thead>
        <tr>
          <th>Site</th>
          <th>Time</th>
          <th>Type</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>

  <!-- 💬 MOTIVATION -->
  <div class="card center">
    <div id="motivation">Loading insight...</div>
  </div>

  <!-- 🚀 PRO -->
  <div class="card">
    <h3>🚀 Pro Features</h3>
    
    <button id="proBtn">🔒 Unlock Pro</button>

    <div style="margin-top:10px;">
      <input id="proCode" placeholder="Enter Pro Code" />
      <button id="activatePro">Activate</button>
    </div>
  </div>

  <!-- 📤 SHARE -->
  <button id="shareBtn">📤 Share Report</button>

  <!-- 🎨 CANVAS -->
  <canvas id="shareCanvas" width="600" height="800" style="display:none;"></canvas>

</div>

<!-- SCRIPTS -->
<script src="config.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
