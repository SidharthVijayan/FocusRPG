<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FocusRPG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- 🔝 TOP BAR -->
  <header class="topbar">
    <div class="logo">🎮 FocusRPG</div>

    <div class="top-stats">
      <div id="levelBox">Level 0</div>
      <div id="xpBox">XP 0</div>
      <div id="streakMini">🔥 0</div>
    </div>
  </header>

  <!-- 🧠 HERO SECTION -->
  <section class="hero">

    <div class="hero-left">
      <div id="avatar" class="avatar">🙂 Loading...</div>
      <div id="motivation" class="motivation">Loading insight...</div>
    </div>

    <div class="hero-right">
      <div class="xp-container">
        <div class="xp-label">XP Progress</div>
        <div class="xp-bar">
          <div id="xpFill" class="xp-fill"></div>
        </div>
      </div>
    </div>

  </section>

  <!-- 📊 MAIN GRID -->
  <main class="grid">

    <div class="panel">
      <h3>📊 Today</h3>
      <div id="stats">Loading...</div>
    </div>

    <div class="panel">
      <h3>🏅 Badges</h3>
      <div id="badges">Loading...</div>
    </div>

    <div class="panel">
      <h3>🎯 Quests</h3>
      <div id="quests">Loading...</div>
    </div>

    <div class="panel streak-panel">
      <div id="streakBox">🔥 Loading...</div>
    </div>

  </main>

  <!-- 🌐 ACTIVITY TABLE -->
  <section class="table-section">
    <h3>🌐 Activity Breakdown</h3>

    <table>
      <thead>
        <tr>
          <th>Site</th>
          <th>Time</th>
          <th>Type</th>
        </tr>
      </thead>

      <tbody id="table"></tbody>
    </table>
  </section>

  <!-- 📤 SHARE -->
  <div class="share">
    <button id="shareBtn">📤 Share Report</button>
  </div>

  <!-- 🎨 HIDDEN CANVAS (FOR SHARE IMAGE) -->
  <canvas id="shareCanvas" width="600" height="800" style="display:none;"></canvas>

</div>

<!-- 🔥 LEVEL UP POPUP -->
<div id="levelUpPopup" class="level-popup hidden">
  <div class="popup-box">
    <div class="popup-title">🔥 LEVEL UP!</div>
    <div id="levelText">Level Up</div>
  </div>
</div>

<!-- 🎉 CONFETTI CANVAS -->
<canvas id="confettiCanvas"></canvas>

<!-- SCRIPTS -->
<script src="config.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
