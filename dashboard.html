<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FocusRPG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo">🎮 FocusRPG</div>
    <div class="top-stats">
      <div id="levelBox"></div>
      <div id="xpBox"></div>
      <div id="streakMini"></div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div>
      <div id="avatar" class="avatar"></div>
      <div id="motivation" class="motivation"></div>
    </div>

    <div class="xp-container">
      <div class="xp-label">XP Progress</div>
      <div class="xp-bar">
        <div id="xpFill" class="xp-fill"></div>
      </div>
    </div>
  </section>

  <!-- GRID -->
  <main class="grid">

    <div class="panel">
      <h3>📊 Today</h3>
      <div id="stats"></div>
    </div>

    <div class="panel">
      <h3>🏅 Badges</h3>
      <div id="badges"></div>
    </div>

    <div class="panel">
      <h3>🎯 Quests</h3>
      <div id="quests"></div>
    </div>

    <div class="panel streak-panel">
      <div id="streakBox"></div>
    </div>

  </main>

  <!-- TABLE -->
  <section class="table-section">
    <h3>🌐 Activity</h3>
    <table>
      <thead>
        <tr>
          <th>Site</th>
          <th>Time</th>
          <th>Type</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </section>

  <!-- SHARE -->
  <div class="share">
    <button id="shareBtn">📤 Share Report</button>
  </div>

  <canvas id="shareCanvas" width="600" height="800" style="display:none;"></canvas>

</div>

<!-- LEVEL UP POPUP -->
<div id="levelUpPopup" class="level-popup hidden">
  <div class="popup-box">
    <div class="popup-title">🔥 LEVEL UP!</div>
    <div id="levelText"></div>
  </div>
</div>

<!-- CONFETTI -->
<canvas id="confettiCanvas"></canvas>

<script src="config.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
